<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" role="img" aria-label="EG4 FlexBOSS18 hybrid inverter illustration">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#1E293B"/>
      <stop offset="1" stop-color="#0F172A"/>
    </linearGradient>
    <linearGradient id="body" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#334155"/>
      <stop offset="0.5" stop-color="#1E293B"/>
      <stop offset="1" stop-color="#0F172A"/>
    </linearGradient>
    <linearGradient id="screen" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0EA5E9" stop-opacity="0.25"/>
      <stop offset="1" stop-color="#0F172A"/>
    </linearGradient>
    <linearGradient id="goldbar" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#F59E0B"/>
      <stop offset="1" stop-color="#FBBF24"/>
    </linearGradient>
    <radialGradient id="glow" cx="0.5" cy="0.35" r="0.7">
      <stop offset="0" stop-color="#F59E0B" stop-opacity="0.12"/>
      <stop offset="1" stop-color="#F59E0B" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <rect width="800" height="600" fill="url(#bg)"/>
  <rect width="800" height="600" fill="url(#glow)"/>

  <!-- wall shadow -->
  <ellipse cx="400" cy="540" rx="230" ry="20" fill="#000" opacity="0.35"/>

  <!-- inverter body -->
  <rect x="240" y="80" width="320" height="440" rx="24" fill="url(#body)" stroke="#475569" stroke-width="2"/>
  <rect x="240" y="80" width="320" height="440" rx="24" fill="none" stroke="#F59E0B" stroke-opacity="0.25" stroke-width="1"/>

  <!-- top gold accent bar -->
  <rect x="264" y="104" width="272" height="6" rx="3" fill="url(#goldbar)"/>

  <!-- display screen -->
  <rect x="280" y="136" width="240" height="120" rx="10" fill="url(#screen)" stroke="#475569" stroke-width="1.5"/>
  <text x="296" y="166" font-family="ui-monospace, monospace" font-size="16" fill="#FBBF24">13.0 kW</text>
  <text x="296" y="188" font-family="ui-monospace, monospace" font-size="11" fill="#94A3B8">SOLAR INPUT</text>
  <polyline points="296,236 320,228 344,232 368,214 392,220 416,200 440,206 464,188 488,194 504,182"
            fill="none" stroke="#F59E0B" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- status LEDs -->
  <circle cx="296" cy="290" r="6" fill="#22C55E"/>
  <circle cx="320" cy="290" r="6" fill="#FBBF24"/>
  <circle cx="344" cy="290" r="6" fill="#334155" stroke="#475569"/>
  <text x="368" y="295" font-family="system-ui, sans-serif" font-size="12" fill="#64748B">GRID-FREE MODE</text>

  <!-- vents -->
  <g fill="#0F172A" stroke="#475569" stroke-width="1">
    <rect x="280" y="320" width="240" height="8" rx="4"/>
    <rect x="280" y="338" width="240" height="8" rx="4"/>
    <rect x="280" y="356" width="240" height="8" rx="4"/>
    <rect x="280" y="374" width="240" height="8" rx="4"/>
  </g>

  <!-- branding plate -->
  <rect x="280" y="408" width="240" height="64" rx="8" fill="#0F172A" stroke="#475569" stroke-width="1"/>
  <text x="400" y="436" text-anchor="middle" font-family="system-ui, sans-serif" font-weight="800" font-size="22" fill="#F8FAFC">EG4<tspan fill="#F59E0B"> FlexBOSS18</tspan></text>
  <text x="400" y="458" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" letter-spacing="2" fill="#94A3B8">HYBRID INVERTER</text>

  <!-- conduit stubs -->
  <rect x="300" y="520" width="24" height="36" rx="6" fill="#334155" stroke="#475569"/>
  <rect x="388" y="520" width="24" height="36" rx="6" fill="#334155" stroke="#475569"/>
  <rect x="476" y="520" width="24" height="36" rx="6" fill="#334155" stroke="#475569"/>

  <!-- sun rays accent -->
  <g stroke="#F59E0B" stroke-width="3" stroke-linecap="round" opacity="0.8">
    <line x1="120" y1="140" x2="150" y2="170"/>
    <line x1="96" y1="200" x2="138" y2="208"/>
    <line x1="120" y1="262" x2="152" y2="240"/>
  </g>
  <circle cx="92" cy="148" r="26" fill="none" stroke="#F59E0B" stroke-width="3" opacity="0.8"/>
  <circle cx="92" cy="148" r="12" fill="#F59E0B" opacity="0.9"/>

  <!-- bolt accent -->
  <path d="M664 360 L640 412 L662 412 L648 460 L692 396 L668 396 L686 360 Z" fill="#F59E0B" opacity="0.9"/>
</svg>
